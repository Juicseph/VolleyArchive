</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="interactive.jsx"></script>

<script type="text/babel">
function App() {
  const [page, setPage] = React.useState('home');
  const [year, setYear] = React.useState(null);
  const [decade, setDecade] = React.useState(null);

  // Map year to decade id
  const yearToDecade = (y) => {
    if (y < 1970) return '60s';
    if (y < 1980) return '70s';
    if (y < 1990) return '80s';
    if (y < 2000) return '90s';
    if (y < 2010) return '00s';
    if (y < 2020) return '10s';
    return '20s';
  };

  const handleNav = (p) => { setPage(p); setYear(null); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const handleYear = (y) => setYear(y);
  const handleDecade = (d) => { setDecade(d); setPage('decade'); window.scrollTo({ top: 0, behavior: 'smooth' }); };

  let body;
  if (page === 'home') body = <HomePage onNav={handleNav} onYearClick={handleYear} onDecadeClick={handleDecade} />;
  else if (page === 'decades') body = <HomePage onNav={handleNav} onYearClick={handleYear} onDecadeClick={handleDecade} />;
  else if (page === 'decade') body = <DecadePage decadeId={decade} onYearClick={handleYear} onBack={() => handleNav('home')} />;
  else if (page === 'coaches') body = <CoachesPage onBack={() => handleNav('home')} />;
  else if (page === 'trophy') body = <TrophyCase onBack={() => handleNav('home')} onYearClick={handleYear} />;
  else if (page === 'roster-search') body = <RosterSearch onBack={() => handleNav('home')} onYearClick={handleYear} />;
  else if (page === 'timeline') body = <TimelinePage onBack={() => handleNav('home')} onYearClick={handleYear} />;
  else if (page === 'memories') body = <MemoryWall onBack={() => handleNav('home')} />;
  else if (page === 'gallery') body = <PhotoWall onBack={() => handleNav('home')} />;

  return (
    <div>
      <Nav active={page} onNav={handleNav} />
      {body}
      <Footer />
      {year && <YearDetail year={year} onClose={() => setYear(null)} onPickYear={(y) => setYear(y)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
